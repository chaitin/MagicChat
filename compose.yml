name: mygod

# Project images are pulled through the GHCR mirror by default.
services:
  postgres:
    container_name: mygod-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - ./data/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  assistant:
    container_name: assistant
    image: ${IMAGE_REGISTRY:-ghcr.1ms.run/chaitin/magicchat}/assistant:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      CONFIG: /app/config/config.yaml
      LOG_FILE: /app/log/assistant.log
      MYGOD_APP_SECRET: ${MYGOD_AI_ASSISTANT_SECRET:-change-me}
    volumes:
      - ./data/assistant/config:/app/config:ro
      - ./data/assistant/log:/app/log

  server:
    container_name: mygod-server
    image: ${IMAGE_REGISTRY:-ghcr.1ms.run/chaitin/magicchat}/server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONFIG: /app/config/config.yaml
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
      CLIENT_HTTPS_PORT: ${CLIENT_HTTPS_PORT:-443}
      ADMIN_HTTPS_PORT: ${ADMIN_HTTPS_PORT:-1443}
      ASSETS_HOSTNAME: ${ASSETS_HOSTNAME:-assets.localhost}
      MYGOD_AI_ASSISTANT_SECRET: ${MYGOD_AI_ASSISTANT_SECRET:-change-me}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-change-me}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-change-me}
    volumes:
      - ./data/server/config:/app/config:ro
      - ./data/server/log:/app/log
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:20080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    container_name: mygod-nginx
    image: ${IMAGE_REGISTRY:-ghcr.1ms.run/chaitin/magicchat}/nginx:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:-localhost}
      CLIENT_HTTPS_PORT: ${CLIENT_HTTPS_PORT:-443}
      ADMIN_HTTPS_PORT: ${ADMIN_HTTPS_PORT:-1443}
    ports:
      - "80:80"
      - "${CLIENT_HTTPS_PORT:-443}:${CLIENT_HTTPS_PORT:-443}"
      - "${ADMIN_HTTPS_PORT:-1443}:${ADMIN_HTTPS_PORT:-1443}"
    volumes:
      - ./data/nginx/certs:/etc/nginx/certs:ro
      - ./data/nginx/log:/var/log/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1:$${CLIENT_HTTPS_PORT}/nginx-healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
