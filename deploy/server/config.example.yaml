server:
  addr: ":20080"

database:
  dsn: "postgres://app:app@postgres:5432/app?sslmode=disable"

admin:
  password: "change-me"

apps:
  ai_assistant_secret: "change-me"

storage:
  provider: "s3"
  endpoint: "https://s3.example.com"
  region: "us-east-1"
  access_key_id: ""
  secret_access_key: ""
  force_path_style: true
  buckets:
    public: "magicchat-public"
    private: "magicchat-private"
    temporary: "magicchat-temporary"
  lifecycle:
    temporary_expire_days: 180
    abort_multipart_days: 7
